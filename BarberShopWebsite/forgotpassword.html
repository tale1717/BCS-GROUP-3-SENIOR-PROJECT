<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Triple T&G Barbers - Forgot Password</title>
    <link rel="icon" href="./3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="isCustomerLoggedIn.js"></script>
    <script type="module" src="forgot-password.js"></script>
</head>
<body>

<header>
    <div class="container nav">
        <a href="./">
            <h1 class="logo">TRIPLE T&G BARBERS</h1>
        </a>
        <nav>
            <a href="about-us.html">About Us</a>
            <a href="contact.html">Contact</a>
            <a id="profile-login" href="customer-login.html">Sign In</a>
            <a id="book-now" href="appointment.html" class="book-now">Book Now</a>
        </nav>
    </div>
</header>

<section class="hero-auth"></section>

<section class="auth-container">
    <div class="auth-card">
        <h1>Forgot Password</h1>
        <p class="auth-subtitle">
            Enter your email and we’ll send you a password reset link.
        </p>

        <form class="auth-form" id="forgotPasswordForm">
            <div class="form-group">
                <input
                        id="resetEmail"
                        type="email"
                        placeholder="Enter your email*"
                        required
                />
            </div>

            <div class="auth-actions">
                <button type="submit" class="primary-btn" id="resetBtn">
                    Send Reset Link
                </button>
            </div>

            <p id="resetMessage" style="margin-top: 12px; font-size: 14px;"></p>

            <div class="auth-divider"></div>

            <p class="auth-footer">
                Remember your password?
                <a href="customer-login.html" class="auth-link">
                    <strong>Sign In</strong>
                </a>
            </p>
        </form>
    </div>
</section>

</body>
</html>
