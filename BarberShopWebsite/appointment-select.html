<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Triple T&G Barbers - Booking</title>
    <link rel="icon" href="./3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="calendar.css">
    <script type="module" src="isCustomerLoggedIn.js"></script>
    <script type="module" src="appointment-select.js"></script>

    <script type="module" src="calendar.js"></script>
    <script type="module" src="time-select.js"></script>

    <!--email browser script installation (using emailjs since it's free)-->
    <script type="text/javascript"
            src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
        (function(){
            emailjs.init({
                publicKey: "mtJJBvYpXNOLAyXaC",
            });
        })();
    </script>

</head>
<body>

<!-- Navigation -->
<header>
    <div class="container nav">
        <a href="./">
            <h1 class="logo">TRIPLE T&G BARBERS</h1>
        </a>
        <nav>
            <a href="about-us.html">About Us</a>
            <a href="contact.html">Contact</a>
            <a id="profile-login" href="customer-login.html">Sign In</a>
            <a id="book-now" href="appointment.html" class="book-now">Book Now</a>
        </nav>
    </div>
</header>

<!-- Hero Image -->
<section class="hero-appointment"></section>

<!-- Appointment Selection -->
<main class="appointment-container">
    <h1>Book Your Appointment</h1>
    <p class="subtitle">Please choose a selected time and day</p>

    <div class="booking-interface">
        <div class="calendar">
            <div class="calendar-container">
                <header class="calendar-header">
                    <p class="calendar-current-date"></p>
                    <div class="calendar-navigation">
                <span id="calendar-prev"
                      class="material-symbols-rounded">
                    <
                </span>
                        <span id="calendar-next"
                              class="material-symbols-rounded">
                    >
                </span>
                    </div>
                </header>

                <div class="calendar-body">
                    <ul class="calendar-weekdays">
                        <li>Sun</li>
                        <li>Mon</li>
                        <li>Tue</li>
                        <li>Wed</li>
                        <li>Thu</li>
                        <li>Fri</li>
                        <li>Sat</li>
                    </ul>
                    <ul class="calendar-dates"></ul>
                </div>
            </div>
        </div>

        <div class="form-container">
            <div class="custom-select">
                Date:
                <p id="date-display" class="input-select"></p>
                <input type="hidden" id="date">
            </div>

            <div class="custom-select">
                Barber:
                <select class="input-select" id="barber">
                    <option value="">Select Barber</option>
                </select>
            </div>

            <div class="custom-select">
                Time:
                <select class="input-select" id="time">
                    <option value="">Select Time</option>
                </select>
            </div>

            <div class="custom-select">
                Type of Service:
                <select class="input-select service-options" id="service" multiple></select>
            </div>

            <a href="appointment-confirm.html" class="btn-confirm" id="confirm-appointment">Confirm Appointment</a>
        </div>
    </div>
</main>

</body>
</html>
