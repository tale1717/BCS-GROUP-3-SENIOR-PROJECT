<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triple T&G Management - Employee Login</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <script type="module" src="./employeeLogin.js"></script>
</head>
<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a class="book-now" href="employeeLogin1.html">Sign In</a>
        </nav>
    </div>
</header>

<section class="hero-image"></section>

<section class="auth-container">
    <div class="auth-card" id="main-login">
        <h1>Sign In</h1>
        <p class="auth-subtitle">Welcome back — sign in to manage barber shop.</p>

        <div class="auth-form">
            <div class="form-group">
                <label for="username">Email</label>
                <input id="username" name="username" type="text" placeholder="you@example.com" required />
            </div>

            <div class="form-group">
                <label for="loginpassword">Password</label>
                <input id="loginpassword" name="password" type="password" placeholder="••••••••" required />
            </div>

            <div class="auth-actions">
                <button id="submit" class="primary-btn">Sign In</button>
                <a class="auth-link" id="change-password">Change Password</a>
            </div>

            <div class="auth-divider"></div>

            <p class="auth-footer">
                <a href="../BarberShopWebsite/">Go Back to Home Page</a>
            </p>

        </div>
    </div>

    <div class="auth-card" style="display: none;" id="temp-pwd">
        <h1>Change Password</h1>
        <p class="auth-subtitle">Change your password.</p>

        <div class="auth-form">
            <div class="form-group">
                <label>Old Password</label>
                <input id="oldPassword" type="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input id="newPassword" type="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input id="confirmPassword" type="password" placeholder="••••••••" required>
            </div>

            <div class="auth-actions">
                <button id="changePasswordBtn" class="primary-btn">Update Password</button>
                <a class="auth-link" id="go-back">Go Back</a>
            </div>
        </div>
    </div>

</section>
</body>
</html>
