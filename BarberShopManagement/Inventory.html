<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <script type="module" src="inventoryModule.js"></script>
    <style>
        .card:hover {
            transform: none;
            box-shadow: none;
            cursor: default;
        }
        table, th, td {
            border: 0;
        }
        th {
            border-bottom: 1px solid gray;
        }
    </style>
</head>

<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="Inventory.html">Inventory</a>
            <a href="rating.html">Ratings</a>
            <a class="book-now" href="profile.html">Profile</a>
        </nav>
    </div>
</header>

<div class="app-container">

    <main class="content">

        <header class="page-header">
            <h1>Inventory</h1>
            <div class="toolbar">
                <input
                        id="searchSupply"
                        placeholder="🔍 Search inventory"
                        class="search">
                <button
                        id="createSupplyBtn"
                        class="create-buttons">
                    + New Item
                </button>

            </div>

        </header>


        <div class="card">
            <table>

                <thead>
                <tr>
                    <th>Supply ID</th>
                    <th>Item Name</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Expiry Date</th>
                    <th>Supplier Name</th>
                    <th>Supplier Phone</th>
                    <th>Supplier Email</th>
                    <th>Supplier Address</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="supply-body">
                </tbody>
            </table>
        </div>

    </main>

</div>


<!-- CREATE -->
<div id="createModal"
     class="modal">
    <div class="modal-content">
        <h2>Create Supply</h2>
        <label>Item</label><br><br>
        <input id="i-name"><br><br>
        <label>Quantity</label><br><br>
        <!--set up low stock alert-->
        <input id="i-qty"><br><br>
        <label>
            <input type="checkbox" id="set-alert">Set Alert</label>

        <div id="alert-box" style="display:none;">

            <br>
            <label>Minimum Quantity</label>
            <br><br>
            <input id="min-qty">

        </div>

        <br>
        <label>Expiry</label><br><br>
        <input type="date" id="i-expiry"><br><br>
        <label>Supplier</label><br><br>
        <input id="sup-name"><br><br>
        <label>Supplier Phone</label><br><br>
        <input id="sup-phone"><br><br>
        <label>Supplier Email</label><br><br>
        <input id="sup-email"><br><br>
        <label>Supplier Address</label><br><br>
        <input id="sup-address">

        <div class="modal-actions">
            <button
                    id="saveCreate"
                    class="create-buttons">
                Save
            </button>

            <button
                    id="cancelCreate"
                    class="cancel-buttons">
                Cancel
            </button>
        </div>
    </div>
</div>


<!-- EDIT -->

<div id="editModal"
     class="modal">
    <div class="modal-content">
        <h2>Edit Supply</h2>
        <input type="hidden" id="edit-id">
        <label>Item</label><br><br>
        <input id="edit-name"><br><br>
        <label>Quantity</label><br><br>
        <input id="edit-qty"><br><br>
        <!--setup low stock alert-->
        <label>
            <input type="checkbox"
                   id="edit-set-alert">
            Set Alert
        </label>

        <div id="edit-alert-box" style="display:none;">
            <br>
            <label>Minimum Quantity</label>
            <br><br>
            <input id="edit-min-qty">
        </div>
        <br>
        <label>Expiry</label><br><br>
        <input type="date" id="edit-expiry"><br><br>
        <label>Supplier</label><br><br>
        <input id="edit-sup-name"><br><br>
        <label>Supplier Phone</label><br><br>
        <input id="edit-sup-phone"><br><br>
        <label>Supplier Email</label><br><br>
        <input id="edit-sup-email"><br><br>
        <label>Supplier Address</label><br><br>
        <input id="edit-sup-address">

        <div class="modal-actions">
            <button
                    id="updateSupply"
                    class="create-buttons">
                Update
            </button>

            <button
                    id="cancelEdit"
                    class="cancel-buttons">
                Cancel
            </button>

        </div>

    </div>

</div>

</body>

</html>
