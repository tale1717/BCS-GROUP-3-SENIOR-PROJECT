<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <script type="module" src="inventoryModule.js"></script>
    <style>
        .card:hover {
            transform: none;
            box-shadow: none;
            cursor: default;
        }
        table, th, td {
            border: 0;
        }
        th {
            border-bottom: 1px solid gray;
        }
    </style>
</head>

<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="Inventory.html">Inventory</a>
            <a href="rating.html">Ratings</a>
            <a class="book-now" href="profile.html">Profile</a>
        </nav>
    </div>
</header>

<div class="app-container">

    <main class="content">

        <header class="page-header">

            <div>
                <h1>Inventory</h1>
                <p>Manage supplies</p>
            </div>

            <div class="toolbar">
                <input
                        id="searchSupply"
                        placeholder="🔍 Search inventory"
                        class="search">
                <button
                        id="createSupplyBtn"
                        class="create-buttons">
                    + New Item
                </button>

            </div>

        </header>


        <div class="card">
            <table>

                <thead>
                <tr>
                    <th data-sort="id">ID <span class="sort-arrow"></span></th>
                    <th data-sort="name">Item Name <span class="sort-arrow"></span></th>
                    <th data-sort="quantity">Quantity <span class="sort-arrow"></span></th>
                    <th data-sort="unit">Unit<span class="sort-arrow"></span></th>
                    <th data-sort="status">Status <span class="sort-arrow"></span></th>
                    <th data-sort="expiry">Expiry Date <span class="sort-arrow"></span></th>
                    <th data-sort="supplierName">Supplier Name <span class="sort-arrow"></span></th>
                    <th>Supplier Phone</th>
                    <th>Supplier Email</th>
                    <th>Supplier Address</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="supply-body">
                </tbody>
            </table>
        </div>

    </main>

</div>


<!-- CREATE -->
<div id="createModal"
     class="modal">
    <div class="modal-content">
        <h2>Create Supply</h2> <br>

        <div class="window-grid">

            <div>
                <label>Item</label><br>
                <input id="i-name" class="text-style">
            </div>

            <div>
                <label>Quantity</label><br>
                <input id="i-qty" class="text-style">
            </div>

            <div>
                <label> <input type="checkbox" id="set-alert">Set Alert</label>

                <div id="alert-box" style="display:none;">
                    <br>
                    <label>Minimum Quantity</label><br>
                    <input id="min-qty" class="text-style">
                </div>
            </div>

            <div>
                <label>Unit</label> <br>
                <select id="i-unit" class="text-style">
                    <option value="">Select Unit</option>
                    <option value="box">Box</option>
                    <option value="tube">Tube</option>
                    <option value="gallon">Gallon</option>
                    <option value="bottle">Bottle</option>
                    <option value="piece">Piece</option>
                </select>
            </div>


            <div>
                <label>Expiry</label><br>
                <input type="date" id="i-expiry" class="text-style">
            </div>

            <div>
                <label>Supplier</label><br>
                <input id="sup-name" class="text-style">
            </div>

            <div>
                <label>Supplier Phone</label><br>
                <input id="sup-phone" class="text-style">
            </div>

            <div>
                <label>Supplier Email</label><br>
                <input id="sup-email" class="text-style"><br>
            </div>

            <div>
                <label>Supplier Address</label><br>
                <input id="sup-address" class="text-style">
            </div>
        </div>

        <div class="modal-action-forButtons">
            <button
                    id="saveCreate"
                    class="edit">
                Save
            </button>

            <button
                    id="cancelCreate"
                    class="cancel-buttons">
                Cancel
            </button>
        </div>
    </div>
</div>


<!-- EDIT -->

<div id="editModal"
     class="modal">
    <div class="modal-content">
        <h2>Edit Supply</h2> <br>

        <label>Inventory ID: </label>
        <input id="edit-id" readonly> <br><br>

        <div class="window-grid">
            <div>
                <label>Item</label><br>
                <input id="edit-name" class="text-style">
            </div>

            <div>
                <label>Quantity</label><br>
                <input id="edit-qty" class="text-style">
            </div>

            <div>
                <label> <input type="checkbox" id="edit-set-alert">Set Alert</label>

                <div id="edit-alert-box" style="display:none;">
                    <br>
                    <label>Minimum Quantity</label><br>
                    <input id="edit-min-qty" class="text-style">
                </div>
            </div>

            <div>
                <label>Unit</label> <br>
                <select id="edit-unit" class="text-style">
                    <option value="">Select Unit</option>
                    <option value="box">Box</option>
                    <option value="tube">Tube</option>
                    <option value="gallon">Gallon</option>
                    <option value="bottle">Bottle</option>
                    <option value="piece">Piece</option>
                </select>
            </div>

            <div>
                <label>Expiry</label><br>
                <input type="date" id="edit-expiry" class="text-style">
            </div>

            <div>
                <label>Supplier</label><br>
                <input id="edit-sup-name" class="text-style">
            </div>

            <div>
                <label>Supplier Phone</label><br>
                <input id="edit-sup-phone" class="text-style">
            </div>

            <div>
                <label>Supplier Email</label><br>
                <input id="edit-sup-email" class="text-style">
            </div>

            <div>
                <label>Supplier Address</label><br>
                <input id="edit-sup-address" class="text-style">
            </div>
        </div>

        <div class="modal-action-forButtons">
            <button id="updateSupply" class="edit">Update</button>
            <button id="cancelEdit" class="cancel-buttons">Cancel</button>
        </div>

    </div>

</div>

</body>

</html>
