<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Appointments</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="./appointmentsModule.js"></script>
    <script type="module" src="logout.js"></script>
</head>
<body>

<div class="app-container">
    <nav class="sidebar">
        <div class="logo">
            <img src="ttt logo centered.png" alt="Triple T Logo" width="200">
        </div>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li class="active"><a href="appointments.html">Appointments</a></li>
            <li><a href="customers.html">Customers</a></li>
            <li><a href="staff.html">Employees</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="inventory.html">Inventory</a></li>
            <li><a href="rating.html">Ratings</a></li>
            <li><li><a href="#" id="logoutBtn">Logout</a></li>
        </ul>


    </nav>


    <!-- MAIN CONTENT -->
    <main class="content">

        <header class="page-header">

            <div>
                <h1>Appointments</h1>
                <p>Manage and schedule appointments</p>
            </div>
 <!--TOOLBAR-->
            <button type="button" id="createAppointmentBtn" class="create-buttons">
                + New Appointment
            </button>

        </header>


        <!-- SEARCH -->
        <div class="card">
            <input
                    id="searchAppointment"
                    placeholder="🔍 Search appointments..."
                    class="search"
            />
        </div>


        <!-- APPOINTMENT TABLE -->
        <div class="card">

            <table>

                <thead>
                <tr>
                    <th>Appointment ID</th>
                    <th>Customer</th>
                    <th>Barber</th>
                    <th>Service</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Note</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody id="appointment-body"></tbody>

            </table>

        </div>

    </main>
</div>


<!-- CREATE APPOINTMENT MODAL -->

<div id="appointmentModal" class="modal">

    <div class="modal-content">

        <h2>Create Appointment</h2>
        <label>Customer Name</label> <br><br>
        <select id="a-customer">
            <option value="">Select Customer</option>
        </select><br><br>
        <label>Barber Name</label> <br><br>
        <select id="a-barber">
            <option value="">Select Barber</option>
        </select><br><br>
        <label>Service</label> <br><br>
        <select id="a-service" multiple size="6"></select>
        <label>Date</label> <br><br>
        <input type="date" id="a-date"> <br><br>
        <label>Time</label> <br><br>
        <input type="time" id="a-time"> <br><br>
        <label>Notes</label>
        <textarea id="a-notes"
                  placeholder="Appointment notes"></textarea>


        <select id="a-status">
            <option value="confirmed">Confirmed</option>
            <option value="cancelled">Cancelled</option>
        </select>
        <div class="modal-action-forButtons">
            <button id="saveAppointment">Save Appointment</button>
            <button id="cancelAppointment">Cancel</button>
        </div>

    </div>

</div>


<!-- EDIT APPOINTMENT MODAL -->
<div id="editAppointmentModal" class="modal">

    <div class="modal-content">

        <h2>Edit Appointment</h2>

        <lable>Appointment ID</lable>
        <input id= "edit-id" readonly> <br><br>

        <label>Customer Name</label> <br><br>
        <select id="edit-customer"></select> <br><br>
        <label>Barber Name</label> <br><br>
        <select id="edit-barber"></select><br><br>
        <label>Service</label> <br><br>
        <select id="edit-service" multiple size="6"></select>
        <label>Date</label> <br><br>
        <input type="date" id="edit-date"> <br><br>
        <label>Time</label> <br><br>
        <input type="time" id="edit-time"> <br><br>
        <label>Note</label> <br><br>
        <textarea id="edit-notes"></textarea> <br><br>
        <label>Status</label> <br><br>
        <select id="edit-status">

            <option value="confirmed">Confirmed</option>

            <option value="completed">Completed</option>

            <option value="cancelled">Cancelled</option>


        </select>

        <div class="modal-action-forButtons">

            <button id="updateAppointment" class="edit">Update
            </button>

            <button id="cancelEditAppointment" class="cancel-buttons">Cancel
            </button>

        </div>

    </div>

</div>

</body>
</html>
