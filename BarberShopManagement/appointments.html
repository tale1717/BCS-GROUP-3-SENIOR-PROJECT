<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Triple T&G Management - Appointments</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <style>
        .card:hover {
            transform: none;
            box-shadow: none;
            cursor: default;
        }
        table, th, td {
            border: 0;
        }
        th {
            border-bottom: 1px solid gray;
        }
    </style>
    <script type="module" src="./appointmentsModule.js"></script>
    <script type="module" src="logout.js"></script>
</head>
<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="Inventory.html">Inventory</a>
            <a href="rating.html">Ratings</a>
            <a class="book-now" href="profile.html">Profile</a>
        </nav>
    </div>
</header>

<div class="app-container">
    <!-- MAIN CONTENT -->
    <main class="content">

        <header class="page-header">

            <div>
                <h1>Appointments</h1>
                <p>Manage and schedule appointments</p>
            </div>

            <div class="toolbar">
                <input
                        id="searchAppointment"
                        placeholder="🔍 Search appointments..."
                        class="search"
                />
                <button type="button" id="createAppointmentBtn" class="create-buttons">
                    + New Appointment
                </button>

            </div>

        </header>


        <!-- APPOINTMENT TABLE -->
        <div class="card">

            <table>

                <thead>
                <tr>
                    <th>Appointment ID</th>
                    <th>Customer</th>
                    <th>Barber</th>
                    <th>Service</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Note</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody id="appointment-body"></tbody>

            </table>

        </div>

    </main>
</div>


<!-- CREATE APPOINTMENT MODAL -->

<div id="appointmentModal" class="modal">

    <div class="modal-content">

        <h2>Create Appointment</h2> <br>

        <div class="window-grid">
            <div>
                <label>Customer Name</label> <br>
                <select class="select" id="a-customer">
                    <option value="">Select Customer</option>
                </select>
            </div>

            <div>
                <label>Barber Name</label> <br>
                <select id="a-barber">
                    <option value="">Select Barber</option>
                </select>
            </div>

            <div>
                <label>Services</label> <br>
                <select id="a-service" multiple size="6"></select>
            </div>

            <div>
                <div>
                    <label>Date</label> <br>
                    <input type="date" id="a-date" class="text-style"> <br>
                </div>
                <br>
                <div>
                    <label>Time</label> <br>
                    <input type="time" id="a-time" class="text-style"> <br>
                </div>
            </div>

            <div>
                <label>Notes</label> <br>
                <textarea id="a-notes" placeholder="Appointment notes"></textarea>
            </div>

            <div>
                <label>Status</label> <br>
                <select id="a-status">
                    <option value="confirmed" class="confirmed">Confirmed</option>
                    <option value="cancelled" class="cancelled">Cancelled</option>
                </select>
            </div>
        </div>

        <div class="modal-action-forButtons">
            <button id="saveAppointment" class="edit">Save Appointment</button>
            <button id="cancelAppointment" class="cancel-buttons">Cancel</button>
        </div>

    </div>

</div>


<!-- EDIT APPOINTMENT MODAL -->
<div id="editAppointmentModal" class="modal">

    <div class="modal-content">

        <h2 class="window-title">Edit Appointment</h2> <br>

        <label>Appointment ID: </label>
        <input id="edit-id" readonly> <br><br>

        <div class="window-grid">
            <div>
                <label>Customer Name</label> <br>
                <select id="edit-customer"></select> <br>
            </div>

            <div>
                <label>Barber Name</label> <br>
                <select id="edit-barber"></select><br>
            </div>

            <div>
                <label>Service</label> <br>
                <select id="edit-service" multiple size="6"></select>
            </div>

            <div>
                <div>
                    <label>Date</label> <br>
                    <input type="date" id="edit-date" class="text-style"> <br>
                </div>
                <br>
                <div>
                    <label>Time</label> <br>
                    <input type="time" id="edit-time" class="text-style"> <br>
                </div>
            </div>

            <div>
                <label>Note</label> <br>
                <textarea id="edit-notes"></textarea> <br>
            </div>

            <div>
                <label>Status</label> <br>
                <select id="edit-status">
                    <option value="confirmed" class="confirmed">Confirmed</option>
                    <option value="cancelled" class="cancelled">Cancelled</option>
                    <option value="completed" class="completed">Completed</option>
                </select>
            </div>
        </div>

        <div class="modal-action-forButtons">

            <button id="updateAppointment" class="edit">Update</button>

            <button id="cancelEditAppointment" class="cancel-buttons">Cancel</button>

        </div>

    </div>

</div>

</body>
</html>
