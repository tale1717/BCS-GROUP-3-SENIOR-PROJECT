<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Triple T&G Management - Customers</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <style>
        .card:hover {
            transform: none;
            box-shadow: none;
            cursor: default;
        }
        table, th, td {
            border: 0;
        }
        th {
            border-bottom: 1px solid gray;
        }
    </style>
    <script type="module" src="./customersModule.js"></script>
</head>
<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="Inventory.html">Inventory</a>
            <a href="rating.html">Ratings</a>
            <a href="reports.html">Reports</a>
            <a class="book-now" href="profile.html">Profile</a>
        </nav>
    </div>
</header>

<div class="app-container">

    <!-- RIGHT CONTENT -->
    <main class="content">

        <header class="page-header">

            <div>
                <h1>Customers</h1>
                <p>Manage customers</p>
            </div>

            <div class="toolbar">
                <input id="searchCustomer" placeholder="🔍 Search customers..." class="search"/>

                <button id="createCustomerBtn" class="create-buttons">
                    + New Customer
                </button>
            </div>


        </header>

<!--Customer List-->
        <div class="card">

            <table>

                <thead>

                <tr>         
                    <th data-sort="id">ID <span class="sort-arrow"></span></th>
                    <th data-sort="name">Name <span class="sort-arrow"></span></th>
                    <th data-sort="phone">Phone <span class="sort-arrow"></span></th>
                    <th data-sort="email">Email <span class="sort-arrow"></span></th>
                    <th>History</th>
                    <th>Actions</th>
                </tr>

                </thead>

                <tbody id="customer-body"></tbody>

            </table>

        </div>

    </main>



<!-- ================= MODALS ================= -->

<!-- create customer -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <h2>Create New Customer</h2><br>

        <div class="window-grid">
            <div>
                <label class="text">First Name</label>
                <input id="c-firstName" class="text-style" placeholder="First Name" /> <br>
            </div>

            <div>
                <label class="text">Last Name</label>
                <input id="c-lastName" class="text-style" placeholder="Last Name" /> <br><br>
            </div>

            <div>
                <label class="text">Phone Number</label>
                <input id="c-phone" class="text-style" placeholder="Phone Number" /> <br><br>
            </div>

            <div>
                <label class="text">Email Address</label>
                <input id="c-email" class="text-style" placeholder="Email" /> <br><br>
            </div>

        </div>

        <div class="modal-action-forButtons">
            <button id="saveCreate" class="edit">Save</button>
            <button id="cancelCreate" class="cancel-buttons">Cancel</button>
        </div>
    </div>
</div>

<!-- edit customer -->
    <div id="editModal" class="modal">

        <div class="modal-content">

            <h2>Edit Customer</h2> <br>

            <label>Customer ID: </label>
            <input id="edit-id" readonly> <br><br>

            <div class="window-grid">
                <div>
                    <label class="text">First Name</label> <br>
                    <input id="edit-firstName" class="text-style">
                </div>

                <div>
                    <label class="text">Last Name</label> <br>
                    <input id="edit-lastName" class="text-style">
                </div>

                <div>
                    <label class="text">Phone Number</label> <br>
                    <input id="edit-phone" class="text-style">
                </div>

                <div>
                    <label class="text">Email Address</label> <br>
                    <input id="edit-email" class="text-style">
                </div>
            </div>


            <input type="hidden" id="edit-id">
            <label class="text">Customer First Name</label>
            <input id="edit-firstName" class="text-field"> <br><br>
            <label class="text">Customer Last Name</label>
            <input id="edit-lastName" class="text-field"> <br><br>
            <label class="text">Customer Phone</label>
            <input id="edit-phone" class="text-field"> <br><br>
            <label class="text">Customer Email</label>
            <input id="edit-email" class="text-field"> <br><br>
            <label class="text">History</label><br><br>
           <input id="history-input" class="text-field">
          <br><br>

            <div class="modal-action-forButtons">
                <button id="updateCustomer" class="edit">Update</button>
                <button id="cancelEdit" class="cancel-buttons">Cancel</button>

            </div>

        </div>

    </div>

</div>

<!--History pop up-->
<div id="historyModal" class="modal">
    <div class="modal-content">
        <h3>Customer History</h3>

        <div id="history-list" style="max-height:200px; overflow:auto;"></div>

        <br>
        <input id="new-history-note" class="text-field" placeholder="Add note">
        <br><br>

        <button id="saveHistoryNote" class="create-buttons">Add</button>
        <button id="closeHistoryModal" class="cancel-buttons">Close</button>
    </div>
</div>

</body>
</html>
