<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Triple T&G Management - Customers</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <style>
        .card:hover {
            transform: none;
            box-shadow: none;
            cursor: default;
        }
    </style>
    <script type="module" src="./customersModule.js"></script>
</head>
<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="rating.html">Ratings</a>
            <a href="#" id="logoutBtn" class="book-now">Log Out</a>
        </nav>
    </div>
</header>

<div class="app-container">

    <!-- RIGHT CONTENT -->
    <main class="content">

        <header class="page-header">

            <div>
                <h1>Customers</h1>
                <p>Manage customers</p>
            </div>

            <div class="toolbar">
                <input id="searchCustomer" placeholder="🔍 Search customers..." class="search"/>

                <button id="createCustomerBtn" class="create-buttons">
                    + New Customer
                </button>
            </div>


        </header>

<!--Customer List-->
        <div class="card">

            <table>

                <thead>

                <tr>
                    <th>Customer ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Actions</th>

                </tr>

                </thead>

                <tbody id="customer-body"></tbody>

            </table>

        </div>

    </main>



<!-- ================= MODALS ================= -->

<!-- create customer -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <h2>Create Customer</h2><br><br>
        <label class="text">Customer First Name</label>
        <input id="c-firstName" class="text-field" placeholder="First Name" /> <br><br>
        <label class="text">Customer Last Name</label>
        <input id="c-lastName" class="text-field" placeholder="Last Name" /> <br><br>
        <label class="text">Customer Phone</label>
        <input id="c-phone" class="text-field" placeholder="Phone" /> <br><br>
        <label class="text">Customer Email</label>
        <input id="c-email" class="text-field" placeholder="Email" /> <br><br>
        <div class="modal-action-forButtons">
            <button id="saveCreate" class="create-buttons">Save</button>
            <button id="cancelCreate" class="cancel-buttons">Cancel</button>
        </div>
    </div>
</div>

<!-- edit customer -->
    <div id="editModal" class="modal">

        <div class="modal-content">

            <h2>Edit Customer</h2>

            <input type="hidden" id="edit-id">
            <label class="text">Customer First Name</label>
            <input id="edit-firstName" class="text-field"> <br><br>
            <label class="text">Customer Last Name</label>
            <input id="edit-lastName" class="text-field"> <br><br>
            <label class="text">Customer Phone</label>
            <input id="edit-phone" class="text-field"> <br><br>
            <label class="text">Customer Email</label>
            <input id="edit-email" class="text-field"> <br><br>

            <div class="modal-action-forButtons">
                <button id="updateCustomer" class="create-buttons">Update</button>
                <button id="cancelEdit" class="cancel-buttons">Cancel</button>

            </div>

        </div>

    </div>

</div>


</body>
</html>
