<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Customer Management</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="./customersModule.js"></script>
</head>

<body>
<div class="app-container">

    <!-- SIDEBAR -->
    <nav class="sidebar">
        <div class="logo">
            <img src="ttt logo centered.png" alt="Triple T Logo" width="200">
        </div>

        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="appointments.html">Appointments</a></li>
            <li class="active"><a href="customers.html">Customers</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="staff.html">Barbers</a></li>
        </ul>

        <a href="dashboard.html"><li>back</li></a>

    </nav>

    <!-- RIGHT CONTENT -->
    <main class="content">

        <header class="page-header">

            <div>
                <h1>Customers</h1>
                <p>Manage customers</p>
            </div>

            <button id="createCustomerBtn" class="create-buttons">
                + New Customer
            </button>

        </header>


        <div class="card">

            <input
                    id="searchCustomer"
                    placeholder="🔍 Search customers..."
                    class="search"
            />

        </div>

<!--Customer List-->
        <div class="card">

            <table>

                <thead>

                <tr>
                    <th>Customer ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Actions</th>

                </tr>

                </thead>

                <tbody id="customer-body"></tbody>

            </table>

        </div>

    </main>



<!-- ================= MODALS ================= -->

<!-- create customer -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <h2>Create Customer</h2><br><br>
        <label class="text">Customer Name</label>
        <input id="c-name" class="text-field" placeholder="Full Name" /> <br><br>
        <label class="text">Customer Phone</label>
        <input id="c-phone" class="text-field" placeholder="Phone" /> <br><br>
        <label class="text">Customer Email</label>
        <input id="c-email" class="text-field" placeholder="Email" /> <br><br>
        <div class="modal-action-forButtons">
            <button id="saveCreate" class="create-buttons">Save</button>
            <button id="cancelCreate" class="cancel-buttons">Cancel</button>
        </div>
    </div>
</div>

<!-- edit customer -->
    <div id="editModal" class="modal">

        <div class="modal-content">

            <h2>Edit Customer</h2>

            <input type="hidden" id="edit-id">
            <label class="text">Customer Name</label>
            <input id="edit-name" class="text-field"> <br><br>
            <label class="text">Customer Phone</label>
            <input id="edit-phone" class="text-field"> <br><br>
            <label class="text">Customer Email</label>
            <input id="edit-email" class="text-field"> <br><br>

            <div class="modal-action-forButtons">
                <button id="updateCustomer" class="create-buttons">Update</button>
                <button id="cancelEdit" class="cancel-buttons">Cancel</button>

            </div>

        </div>

    </div>


</body>
</html>
