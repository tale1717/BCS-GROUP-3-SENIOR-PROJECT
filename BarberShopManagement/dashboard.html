<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple T&G Management - Dashboard</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <style>
        .card:hover {
            transform: none;
            box-shadow: none;
            cursor: default;
        }
    </style>
    <script type="module" src="logout.js"></script>
    <script type="module" src="dashboardModule.js"></script>
</head>
<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="Inventory.html">Inventory</a>
            <a href="rating.html">Ratings</a>
            <a href="reports.html">Reports</a>
            <a class="book-now" href="profile.html">Profile</a>
        </nav>
    </div>
</header>

<div class="app-container">

    <main class="content">
        <header class="page-header">
            <div>
                <h1>Dashboard</h1>
                <p>Welcome back! Here's what's happening today.</p>
            </div>
        </header>

        <section class="stats-grid">
            <div class="card">Today's Appointments<h3 id="todayAppointments">0</h3></div>
            <div class="card">Today's Revenue<h3 id="todayRevenue">$0</h3></div>
            <div class="card">Available Barbers <h3>3</h3></div>
            <div class="card">Avg. Rating <h3>4.8</h3></div>
        </section>

        <div class="card">

        <h2>Customers Trend</h2> <br><br>
        <!-- Toggle -->
        <label for="viewMode">View:</label>
        <select id="viewMode" class="optionlist">
            <option value="week">This Week</option>
            <option value="month">This Month</option>
        </select>

        <!--resize function-->
        <div class="resizable-box">
            <canvas id="customerLineChart"></canvas>


        <!-- Chart.js -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>



        <!-- Chart -->
        <div style="width:100%; height:350px;">
            <canvas id="customerLineChart"></canvas>
        </div>

        <!-- Script -->
        <script type="module" src="dashboardModule.js"></script>
        </div>
        </div>



    </main>

</div>

</body>
</html>
