<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple T&G Barbers - Employees Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <script type="module" src="logout.js"></script>
</head>
<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="rating.html">Ratings</a>
            <a href="#" id="logoutBtn" class="book-now">Log Out</a>
        </nav>
    </div>
</header>

<div class="app-container">

    <main class="content">
        <header>
            <h1>Dashboard</h1>
            <p>Welcome back! Here's what's happening today.</p>
        </header>

        <section class="stats-grid">
            <div class="card">Today's Appointments <h3>12</h3></div>
            <div class="card">Total Customers <h3>324</h3></div>
            <div class="card">Today's Revenue <h3>$840</h3></div>
            <div class="card">Avg. Rating <h3>4.8</h3></div>
        </section>

        <section class="appointments-section">
            <h2>Upcoming Appointments</h2>
            <div id="appointment-list">
                <div class="appointment-item">
                    <span>10:00 AM</span>
                    <strong>John Smith</strong>
                    <span class="status confirmed">Confirmed</span>
                </div>
            </div>
        </section>
    </main>
</div>

</body>
</html>
