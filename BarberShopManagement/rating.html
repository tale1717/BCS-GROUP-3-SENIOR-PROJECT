<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Triple T&G Management - Ratings</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <script type=module src="ratingsModule.js"></script>
    <style>
        .card:hover {
            transform: none;
            box-shadow: none;
            cursor: default;
        }
        body {
            visibility: hidden;
        }
    </style>
    <script type="module" src="auth.js"></script>
    <script type="module" src="logout.js"></script>
</head>
<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="Inventory.html">Inventory</a>
            <a href="rating.html">Ratings</a>
            <a href="reports.html">Reports</a>
            <a class="book-now" href="profile.html">Profile</a>
        </nav>
    </div>
</header>

<div class="app-container">
    <main class="content">
        <header class="page-header">
            <div>
                <h1>Ratings & Feedback</h1>
                <p>View customer ratings and feedback for your services.</p>
            </div>
        </header>

        <section class="stats-grid">
            <div class="card">
                Average Rating
                <h3 id="average-rating">0</h3>
            </div>
            <div class="card">
                Total Reviews
                <h3 id="review-count">0</h3>
            </div>
            <div class="card">
                5-Star Reviews
                <h3 id="five-stars-count">0</h3>
            </div>
            <!--div class="card">
                Needs Follow-Up
                <h3>6</h3>
            </div-->
        </section>

        <section class="appointments-section">
            <h2>Recent Customer Feedback</h2>

            <div class="rating-list" id="rating-list"></div>
        </section>
        <br><br>
    </main>
</div>
</body>
</html>
