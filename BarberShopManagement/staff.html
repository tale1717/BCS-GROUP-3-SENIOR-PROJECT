<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Triple T&G Management - Employees</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <style>
        .card:hover {
            transform: none;
            box-shadow: none;
            cursor: default;
        }
        table, th, td {
            border: 0;
        }
        th {
            border-bottom: 1px solid gray;
        }
    </style>
    <script type="module" src="staffModule.js"></script>
</head>

<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="Inventory.html">Inventory</a>
            <a href="rating.html">Ratings</a>
            <a class="book-now" href="profile.html">Profile</a>
        </nav>
    </div>
</header>

<div class="app-container">


    <main class="content">
        <header class="page-header">
            <div>
                <h1>Employees</h1>
                <p>Manage employees</p>
            </div>
            <div class="toolbar">
                <input id="searchStaff" class="search" placeholder="🔍 Search staff..."/>
                <button id="createStaffBtn" class="create-buttons">+ New Staff</button>
            </div>
        </header>

        <div class="card">
            <table>
                <thead>
                <tr>
                    <th data-sort="id">ID <span class="sort-arrow"></span></th>
                    <th data-sort="name">Name <span class="sort-arrow"></span></th>
                    <th data-sort="phone">Phone <span class="sort-arrow"></span></th>
                    <th data-sort="email">Email <span class="sort-arrow"></span></th>
                    <th data-sort="address">Address <span class="sort-arrow"></span></th>
                    <th data-sort="position">Position <span class="sort-arrow"></span></th>
                    <th>Services</th>
                    <th data-sort="salary">Salary <span class="sort-arrow"></span></th>
                    <th>Working Days</th>
                    <th data-sort="startDate">Start Date <span class="sort-arrow"></span></th>
                    <th data-sort="endDate">End Date <span class="sort-arrow"></span></th>
                    <th>Bank Account</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody id="staff-body">

                </tbody>

            </table>

        </div>

    </main>

</div>


<!-- CREATE STAFF -->

<div id="createStaffModal" class="modal">

    <div class="modal-content">

        <h2>Create Staff</h2> <br>

        <div class="window-grid">

            <div>
                <label>Employee's Name:</label> <br>
                <input id="s-name" placeholder="Name" class="text-style">
            </div>

            <div>
                <label>Phone Number:</label> <br>
                <input id="s-phone" placeholder="Phone" class="text-style">
            </div>

            <div>
                <label>Email:</label> <br>
                <input id="s-email" placeholder="Email" class="text-style">
            </div>

            <div>
                <label>Address:</label> <br>
                <input id="s-address" placeholder="Address" class="text-style">
            </div>

            <div>
                <label>Salary ($/hour):</label> <br>
                <input id="s-salary" placeholder="Salary" class="text-style">
            </div>

            <div>
                <label>Position:</label> <br>
                <select id="s-position" class="text-style">
                    <option value="">Select position</option>
                    <option value="Manager">Manager</option>
                    <option value="Receptionist">Receptionist</option>
                    <option value="Barber">Barber</option>
                    <option value="HR">HR</option>
                </select>

                <div id="servicesSection" style="display:none">
                    <br>
                    <label>Services</label> <br>
                    <select id="s-services" multiple></select>
                </div>
            </div>

            <div>
                <label>Start Date</label> <br>
                <input type="date" id="s-startDate" placeholder="Start Date" class="text-style">
            </div>

            <div>
                <label>End Date</label> <br>
                <input type="date" id="s-endDate" placeholder="Optional Date" class="text-style">
            </div>

            <div>
                <label>Bank Information</label> <br>
                <input id="s-bank" placeholder="Bank Account" class="text-style">
            </div>

            <div style="grid-column: span 2;">
                <label>Working Days</label> <br>
                <div class="day-picker">
                    <input type="checkbox" id="create-sun" name="days" value="sunday">
                    <label for="create-sun">Sun</label>

                    <input type="checkbox" id="create-mon" name="days" value="monday">
                    <label for="create-mon">Mon</label>

                    <input type="checkbox" id="create-tue" name="days" value="tuesday">
                    <label for="create-tue">Tue</label>

                    <input type="checkbox" id="create-wed" name="days" value="wednesday">
                    <label for="create-wed">Wed</label>

                    <input type="checkbox" id="create-thu" name="days" value="thursday">
                    <label for="create-thu">Thu</label>

                    <input type="checkbox" id="create-fri" name="days" value="friday">
                    <label for="create-fri">Fri</label>

                    <input type="checkbox" id="create-sat" name="days" value="saturday">
                    <label for="create-sat">Sat</label>
                </div>
            </div>

        </div>

        <div class="modal-action-forButtons">
            <button id="saveStaff" class="edit">Save</button>
            <button id="cancelStaff" class="cancel-buttons">Cancel</button>
        </div>

    </div>
</div>

<!-- EDIT STAFF MODAL -->
<div id="editStaffModal" class="modal">
    <div class="modal-content">

        <h2>Edit Staff</h2> <br>

        <label>Staff ID: </label>
        <input id="edit-id" readonly> <br><br>

        <div class="window-grid">
            <div>
                <label>Employee's Name:</label> <br>
                <input id="edit-name" placeholder="Name" class="text-style">
            </div>
            <div>
                <label>Phone Number:</label> <br>
                <input id="edit-phone" placeholder="Phone" class="text-style">
            </div>
            <div>
                <label>Email:</label> <br>
                <input id="edit-email" placeholder="Email" class="text-style">
            </div>
            <div>
                <label>Address:</label> <br>
                <input id="edit-address" placeholder="Address" class="text-style">
            </div>
            <div>
                <label>Salary ($/hour):</label> <br>
                <input id="edit-salary" placeholder="Salary" class="text-style">
            </div>

            <div>
                <label>Position:</label> <br>
                <select id="edit-position" class="text-field text-style">
                    <option value="">Select position</option>
                    <option value="Manager">Manager</option>
                    <option value="Receptionist">Receptionist</option>
                    <option value="Barber">Barber</option>
                    <option value="HR">HR</option>
                </select>

                <div id="editServicesSection" style="display:none">
                    <br>
                    <label>Services</label> <br>
                    <select id="edit-services" multiple class="text-style"></select>
                </div>
            </div>

            <div>
                <label>Start Date</label> <br>
                <input type="date" id="edit-startDate" class="text-style">
            </div>
            <div>
                <label>End Date</label> <br>
                <input type="date" id="edit-endDate" class="text-style">
            </div>
            <div>
                <label>Bank Information</label> <br>
                <input id="edit-bank" placeholder="Bank Account" class="text-style">
            </div>
            <div style="grid-column: span 2;">
                <label>Working Days</label> <br>
                <div class="day-picker">
                    <input type="checkbox" id="sun" name="days" value="sunday">
                    <label for="sun">Sun</label>
                    <input type="checkbox" id="mon" name="days" value="monday">
                    <label for="mon">Mon</label>
                    <input type="checkbox" id="tue" name="days" value="tuesday">
                    <label for="tue">Tue</label>
                    <input type="checkbox" id="wed" name="days" value="wednesday">
                    <label for="wed">Wed</label>
                    <input type="checkbox" id="thu" name="days" value="thursday">
                    <label for="thu">Thu</label>
                    <input type="checkbox" id="fri" name="days" value="friday">
                    <label for="fri">Fri</label>
                    <input type="checkbox" id="sat" name="days" value="saturday">
                    <label for="sat">Sat</label>
                </div>
            </div>
        </div>

        <div class="modal-action-forButtons">
            <button id="updateStaff" class="edit">Update</button>
            <button id="cancelEditStaff" class="cancel-buttons">Cancel</button>
        </div>
    </div>

</div>

</body>

</html>
