<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Triple T&G Management - Employees</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <style>
        .card:hover {
            transform: none;
            box-shadow: none;
            cursor: default;
        }
    </style>
    <script type="module" src="staffModule.js"></script>
</head>

<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="rating.html">Ratings</a>
            <a href="#" id="logoutBtn" class="book-now">Log Out</a>
        </nav>
    </div>
</header>

<div class="app-container">


    <main class="content">

        <header class="page-header">

            <div>

                <h1>Employee</h1>

                <p>Employee management</p>

            </div>

            <div class="toolbar">
                <input id="searchStaff" class="search" placeholder="🔍 Search staff..."/>

                <button id="createStaffBtn" class="create-buttons">+ New Staff</button>
            </div>



        </header>


        <div class="card">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Address</th>
                    <th>Position</th>
                    <th>Services</th>
                    <th>Salary</th>
                    <th>Working Hours</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Bank Account</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody id="staff-body">

                </tbody>

            </table>

        </div>

    </main>

</div>


<!-- CREATE STAFF -->

<div id="createStaffModal"
     class="modal">

    <div class="modal-content">

        <h2>Create Staff</h2>
        <label>Employee's Name:</label> <br><br>


        <input id="s-name"
               placeholder="Name"> <br><br>

        <label>Phone Number:</label> <br><br>
        <input id="s-phone"
               placeholder="Phone"> <br><br>

        <label>Email:</label> <br><br>
        <input id="s-email"
               placeholder="Email"> <br><br>

        <label>Address:</label> <br><br>
        <input id="s-address"
               placeholder="Address"> <br><br>


        <Label>Salary ($/hour):</Label>
        <input id="s-salary"
               placeholder="Salary"> <br><br>


        <Label>Position:</Label> <br><br>
        <select id="s-position" class="text-field">

            <option value="">Select position</option>

            <option value="Manager">Manager</option>

            <option value="Receptionist">Receptionist</option>

            <option value="Barber">Barber</option>

            <option value="HR">HR</option>

        </select> <br><br>

        <div id="servicesSection" style="display:none">

            <label>Services</label> <br><br>

            <select id="s-services" multiple></select> <br><br>

        </div>

        <label>Start Date</label>
        <input type="date" id="s-startDate"> <br><br>

        <label>End Date</label>
        <input type="date" id="s-endDate" placeholder="Optional"> <br><br>

        <label>Bank Information</label>
        <input id="s-bank"
               placeholder="Bank Account"> <br><br>

        <label>Working Days</label> <br><br>
        <div class="checkbox-group">
            <label>
                <input type="checkbox" value="Monday" class="workday"> Monday
            </label>

            <label>
                <input type="checkbox" value="Tuesday" class="workday"> Tuesday
            </label>

            <label>
                <input type="checkbox" value="Wednesday" class="workday"> Wednesday
            </label>

            <label>
                <input type="checkbox" value="Thursday" class="workday"> Thursday
            </label>

            <label>
                <input type="checkbox" value="Friday" class="workday"> Friday
            </label>

            <label>
                <input type="checkbox" value="Saturday" class="workday"> Saturday
            </label>

            <label>
                <input type="checkbox" value="Sunday" class="workday"> Sunday
            </label>

        </div>


        <div class="modal-action-forButtons">

            <button id="saveStaff" class="create-buttons">Save</button>
            <button id="cancelStaff" class="cancel-buttons">Cancel</button>

        </div>



    </div>

</div>

</body>

</html>
