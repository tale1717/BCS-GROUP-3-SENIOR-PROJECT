<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple T&G Management - Services</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <style>
        .card:hover {
            transform: none;
            box-shadow: none;
            cursor: default;
        }
        table, th, td {
            border: 0;
        }
        th {
            border-bottom: 1px solid gray;
        }
    </style>
    <script type="module" src="servicesModule.js"></script>
    <script type="module" src="logout.js"></script>

</head>

<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="Inventory.html">Inventory</a>
            <a href="rating.html">Ratings</a>
            <a class="book-now" href="profile.html">Profile</a>
        </nav>
    </div>
</header>

<div class="app-container">

    <!-- RIGHT CONTENT -->
    <main class="content">

        <header class="page-header">

            <div>
                <h1>Services</h1>
                <p>Manage Services</p>
            </div>


            <div class="toolbar">

                <input type="text" id="searchInput" class="search" placeholder="🔍 Search services..." />

                <button id="createServiceBtn" class="create-buttons">
                    + Create New Service
                </button>


            </div>

        </header>


        <!-- SERVICE TABLE -->

        <div class="card">

            <table class="service-table">

                <thead>
                <tr>
                    <th>ServiceID</th>
                    <th>Service Name</th>
                    <th>Price</th>
                    <th>Estimated Time</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody id="service-body"></tbody>

            </table>

        </div>

    </main>

</div>


<!-- CREATE SERVICE MODAL -->

<div id="serviceModal" class="modal">

    <div class="modal-content">

        <h2 class="logintitletext">Create Service</h2>

        <label class="text">Service Name</label><br><br>
        <input id="s-name" class="text-field" placeholder="Service Name"><br><br>

        <label class="text">Price</label><br><br>
        <input id="s-price" class="text-field" placeholder="Price"><br><br>

        <label class="text">Estimated Time (minutes)</label><br><br>
        <input id="s-duration" class="text-field" placeholder="Duration"><br><br>

        <div class="modal-action-forButtons">

            <button id="saveService" class="create-buttons">
                Create
            </button>

            <button id="cancelService" class="cancel-buttons">
                Cancel
            </button>

        </div>


    </div>

</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>Edit Service</h2>

        <input type="hidden" id="edit-id">

        <label>Service Name</label><br><br>
        <input id="edit-name" class="text-field"><br><br>

        <label>Price</label><br><br>
        <input id="edit-price" class="text-field"><br><br>

        <label>Duration</label><br><br>
        <input id="edit-duration" class="text-field"><br><br>

        <div class="modal-actions">

            <button id="updateService" class="create-buttons">
                Update
            </button>

            <button id="cancelEdit" class="cancel-buttons">
                Cancel
            </button>

        </div>

    </div>

</div>


</body>
</html>
