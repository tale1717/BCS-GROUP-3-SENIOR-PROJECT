<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple T&G Management - Services</title>
    <link rel="icon" href="../BarberShopWebsite/3tg-logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../BarberShopWebsite/styles.css">
    <style>
        .card:hover {
            transform: none;
            box-shadow: none;
            cursor: default;
        }
        body {
            visibility: hidden;
        }
        table, th, td {
            border: 0;
        }
        th {
            border-bottom: 1px solid gray;
        }
    </style>
    <script type="module" src="auth.js"></script>
    <script type="module" src="servicesModule.js"></script>
    <script type="module" src="logout.js"></script>

</head>

<body>

<header>
    <div class="container nav">
        <a href="dashboard.html">
            <h1  class="logo">TRIPLE T&G MANAGEMENT</h1>
        </a>
        <nav>
            <a href="appointments.html">Appointments</a>
            <a href="customers.html">Customers</a>
            <a href="staff.html">Employees</a>
            <a href="services.html">Services</a>
            <a href="Inventory.html">Inventory</a>
            <a href="rating.html">Ratings</a>
            <a href="reports.html">Reports</a>
            <a class="book-now" href="profile.html">Profile</a>
        </nav>
    </div>
</header>

<div class="app-container">

    <!-- RIGHT CONTENT -->
    <main class="content">

        <header class="page-header">

            <div>
                <h1>Services</h1>
                <p>Manage Services</p>
            </div>


            <div class="toolbar">

                <input type="text" id="searchInput" class="search" placeholder="🔍 Search services..." />

                <button id="createServiceBtn" class="create-buttons">
                    + Create New Service
                </button>


            </div>

        </header>


        <!-- SERVICE TABLE -->

        <div class="card">

            <table class="service-table">

                <thead>
                <tr>
                    <th data-sort="id">ID <span class="sort-arrow"></span></th>
                    <th data-sort="name">Service Name <span class="sort-arrow"></span></th>
                    <th data-sort="price">Price <span class="sort-arrow"></span></th>
                    <th data-sort="duration">Duration <span class="sort-arrow"></span></th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody id="service-body"></tbody>

            </table>

        </div>
        <br> <br>

    </main>

</div>


<!-- CREATE SERVICE MODAL -->

<div id="serviceModal" class="modal">

    <div class="modal-content service-content">
        <h2>Create Service</h2> <br>

        <div class="window-grid service-grid">
            <div>
                <label class="text">Service Name</label><br>
                <input id="s-name" class="text-style" placeholder="Service Name">
            </div>

            <div>
                <label class="text">Price</label><br>
                <input id="s-price" class="text-style" placeholder="Price">
            </div>

            <div>
                <label class="text">Estimated Time (minutes)</label><br>
                <input id="s-duration" class="text-style" placeholder="Duration">
            </div>
        </div>

        <div class="modal-action-forButtons">
            <button id="saveService" class="edit">Create</button>
            <button id="cancelService" class="cancel-buttons">Cancel</button>
        </div>
    </div>

</div>

<div id="editModal" class="modal">
    <div class="modal-content service-content">
        <h2>Edit Service</h2> <br>

        <input type="hidden" id="edit-id">

        <div class="window-grid service-grid">
            <div>
                <label>Service Name</label><br>
                <input id="edit-name" class="text-style">
            </div>

            <div>
                <label>Price</label><br>
                <input id="edit-price" class="text-style">
            </div>


            <div>
                <label>Duration</label><br>
                <input id="edit-duration" class="text-style">
            </div>
        </div>

        <div class="modal-action-forButtons">
            <button id="updateService" class="edit">Update</button>
            <button id="cancelEdit" class="cancel-buttons">Cancel</button>
        </div>

    </div>

</div>


</body>
</html>
